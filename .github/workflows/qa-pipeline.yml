name: Lite Thinking QA TestOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

    
jobs:
  run-automation-suite:
    name: Ejecución de Pruebas y Reporte
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. Levantar Infraestructura de Kafka (Docker)
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled
        run: |
          echo "Iniciando descarga de imágenes con tolerancia a fallos..."
          # Forzamos un pull preventivo con reintentos antes del build
          docker pull nginx:1.27-alpine || true
          
          # Levantamos el ambiente
          docker compose up -d --build --wait || docker compose up -d --build
          echo "Contenedores Docker levantados de forma exitosa."

      - name: 4. Instalar Dependencias de Pruebas (Playwright)
        working-directory: ./test
        run: |
          npm install --no-package-lock
          # 🛠️ Solución Definitiva: Forzamos los permisos y usamos Node para ejecutar directamente el archivo JS sin pasar por bash/npx
          chmod -R +x node_modules/ || true
          node node_modules/playwright/cli.js install --with-deps


      - name: 5. Ejecutar Pruebas Playwright
        working-directory: ./test
        env:
          CI: true
        run: |
          # 🚀 Ejecución directa de la suite con Node.js saltando el bloqueo de "Permission denied"
          node node_modules/@playwright/test/cli.js test

      - name: 6. Guardar Reporte de Playwright (Opcional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test/playwright-report/
          retention-days: 7