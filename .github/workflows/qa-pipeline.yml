name: Lite Thinking QA TestOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

    
jobs:
  run-automation-suite:
    name: Ejecución de Pruebas y Reporte
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. Levantar Infraestructura de Kafka (Docker)
        run: |
          docker compose up -d --build
          echo "Esperando que Kafka-Broker esté completamente inicializado..."
          sleep 15

      - name: 4. Instalar Dependencias de Pruebas (Playwright)
        working-directory: ./test
        run: |
          npm install --no-package-lock
          # 🛠️ Forzamos la instalación de navegadores usando el paquete directo de red para evitar bloqueos locales
          npx --package=@playwright/test playwright install --with-deps

      - name: 5. Ejecutar Pruebas Playwright
        working-directory: ./test
        env:
          CI: true
        run: |
          # 🚀 Ejecución directa usando el orquestador global de paquetes de Node
          npx --package=@playwright/test playwright test

      - name: 6. Guardar Reporte de Playwright (Opcional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test/playwright-report/
          retention-days: 7